<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akıllı Şifre Üretici | Yiğido</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
}

input {
    width: 80%;
    padding: 10px;
    margin-top: 10px;
    font-size: 16px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #1e3c72;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #16305c;
}

.result {
    margin-top: 20px;
    padding: 10px;
    background: #f1f1f1;
    border-radius: 8px;
    font-weight: bold;
}

.back {
    margin-top: 15px;
    display: block;
    text-decoration: none;
    color: #1e3c72;
}
</style>
</head>

<body>

<div class="container">
    <h1>🔐 İsimden Şifre Üret</h1>

    <input type="text" id="nameInput" placeholder="İsim gir (örnek: Yiğit)">

    <br>
    <button onclick="generatePassword()">Şifre Üret</button>

    <div class="result" id="result"></div>

    <a href="index.html" class="back">← Ana Sayfaya Dön</a>
</div>

<script>
function generatePassword() {
    let name = document.getElementById("nameInput").value.trim();

    if (name === "") {
        alert("İsim girmen gerekiyor!");
        return;
    }

    name = name.toLowerCase();

    let randomNumber = Math.floor(100 + Math.random() * 900);
    let randomNumber2 = Math.floor(100 + Math.random() * 900);
    let symbols = ["!", "@", "#", ".", "_"];
    let randomSymbol = symbols[Math.floor(Math.random() * symbols.length)];

    let password = name + randomNumber + randomSymbol + randomNumber2;

    document.getElementById("result").innerText = password;
}
</script>

</body>
</html>
