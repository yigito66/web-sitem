<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yiğido Python Projeleri</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
}

/* LOADING EKRANI */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #1e1e2f;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #444;
    border-top: 6px solid #4CAF50;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* ANA SAYFA */
.container {
    text-align: center;
    background: rgba(0,0,0,0.4);
    padding: 40px;
    border-radius: 20px;
    width: 90%;
    max-width: 600px;
    backdrop-filter: blur(10px);
    opacity: 0;
    transition: opacity 1s ease;
}

.container.show {
    opacity: 1;
}

.project a {
    display: inline-block;
    padding: 15px 25px;
    font-size: 20px;
    text-decoration: none;
    background-color: #4CAF50;
    color: white;
    border-radius: 10px;
    transition: 0.3s;
}

.project a:hover {
    background-color: #45a049;
    transform: scale(1.05);
}

.info {
    margin-top: 30px;
    font-size: 16px;
    opacity: 0.8;
}
</style>

<script>
window.onload = function() {
    setTimeout(function() {
        document.getElementById("loading").style.display = "none";
        document.querySelector(".container").classList.add("show");
    }, 2000);
}
</script>

</head>

<body>

<!-- LOADING -->
<div id="loading">
    <div class="spinner"></div>
</div>

<!-- ANA SAYFA -->
<div class="container">
    <h1>🚀 Yiğido Python Projeleri</h1>

    <div class="project">
        <a href="hesap-makinesi.html">🧮 Hesap Makinesi Projesi</a>
    </div>

    <div class="info">
        Diğer projeler yapım aşamasındadır.<br>
        Tahmini Süre: 27/02/2026
    </div>
</div>

</body>
</html>
