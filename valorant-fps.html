<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yiğido FPS Sistem</title>
</head>

<body style="font-family:Arial; text-align:center; padding:40px; background:#111; color:white;">

<h1>🎮 Yiğido FPS Hesaplama</h1>

<select id="oyun">
<option value="valorant">Valorant</option>
<option value="cs2">CS2</option>
<option value="fortnite">Fortnite</option>
<option value="gta5">GTA 5</option>
</select>
<br><br>

<input type="text" id="cpu" placeholder="İşlemci"><br><br>
<input type="text" id="gpu" placeholder="Ekran Kartı"><br><br>
<input type="number" id="ram" placeholder="RAM (GB)"><br><br>

<button onclick="hesapla()">FPS Hesapla</button>

<h2 id="sonuc"></h2>

<script>
function hesapla(){

let oyun=document.getElementById("oyun").value;
let cpu=document.getElementById("cpu").value.toLowerCase();
let gpu=document.getElementById("gpu").value.toLowerCase();
let ram=parseInt(document.getElementById("ram").value);

let puan=0;

let cpuModel=cpu.match(/\d{4,5}/);
if(cpuModel){
let model=parseInt(cpuModel[0]);
if(model>=13000) puan+=5;
else if(model>=10000) puan+=4;
else if(model>=8000) puan+=3;
else if(model>=6000) puan+=2;
else puan+=1;
}

if(gpu.includes("4090")||gpu.includes("4080")) puan+=5;
else if(gpu.includes("3070")||gpu.includes("3060")) puan+=4;
else if(gpu.includes("1660")||gpu.includes("1650")) puan+=3;
else puan+=1;

if(ram>=16) puan+=3;
else if(ram>=8) puan+=2;
else puan+=1;

let zorluk=1;
if(oyun=="cs2") zorluk=1.2;
if(oyun=="fortnite") zorluk=1.5;
if(oyun=="gta5") zorluk=1.7;

let fps=Math.floor((puan*30)/zorluk);

let sonuc=document.getElementById("sonuc");

if(fps>=180){
sonuc.innerHTML="🟩 "+fps+"+ FPS (Ultra)";
}
else if(fps>=120){
sonuc.innerHTML="🟩 "+fps+" FPS (Yüksek)";
}
else if(fps>=60){
sonuc.innerHTML="🟨 "+fps+" FPS (Orta)";
}
else{
sonuc.innerHTML="🟥 "+fps+" FPS (Düşük)";
}

}
</script>

</body>
</html>
