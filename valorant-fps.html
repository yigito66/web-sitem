<script>
function kontrol(){

let cpu=document.getElementById("cpu").value.toLowerCase();
let sonuc=document.getElementById("sonuc");

// INTEL İŞLEMCİLER
if(cpu.includes("intel") || cpu.includes("i")){

    // Model numarasını bul (örn 14100)
    let sayi = cpu.match(/\d{4,5}/);

    if(sayi){
        let model = parseInt(sayi[0]);

        if(model >= 13000){
            sonuc.innerHTML="🟩 200+ FPS (Yüksek Ayar)";
        }
        else if(model >= 10000){
            sonuc.innerHTML="🟩 160+ FPS (Yüksek Ayar)";
        }
        else if(model >= 8000){
            sonuc.innerHTML="🟨 120 FPS (Orta-Yüksek Ayar)";
        }
        else if(model >= 6000){
            sonuc.innerHTML="🟨 90 FPS (Orta Ayar)";
        }
        else{
            sonuc.innerHTML="🟥 60 FPS altı (Düşük Ayar)";
        }
    }
    else{
        sonuc.innerHTML="❓ Model algılanamadı.";
    }
}

// AMD RYZEN
else if(cpu.includes("ryzen")){

    let sayi = cpu.match(/\d{4}/);

    if(sayi){
        let model = parseInt(sayi[0]);

        if(model >= 7000){
            sonuc.innerHTML="🟩 220+ FPS (Ultra)";
        }
        else if(model >= 5000){
            sonuc.innerHTML="🟩 180+ FPS (Yüksek)";
        }
        else if(model >= 3000){
            sonuc.innerHTML="🟨 120 FPS (Orta)";
        }
        else{
            sonuc.innerHTML="🟥 60 FPS altı";
        }
    }
    else{
        sonuc.innerHTML="❓ Ryzen modeli algılanamadı.";
    }
}

else{
    sonuc.innerHTML="❓ İşlemci tanınmadı.";
}

}
</script>
