<script>
function hesapla(){

let cpu=document.getElementById("cpu").value.toLowerCase();
let gpu=document.getElementById("gpu").value.toLowerCase();
let ram=parseInt(document.getElementById("ram").value);

let cpuScore=0;
let gpuScore=0;
let ramScore=0;

/* ================= CPU ANALİZ ================= */

let cpuModel=cpu.match(/\d{4,5}/);

if(cpu.includes("intel")){
    if(cpuModel){
        let model=parseInt(cpuModel[0]);
        let nesil=parseInt(model.toString().substring(0,2));

        cpuScore = nesil; // Nesil kadar puan
    }
}

else if(cpu.includes("ryzen")){
    if(cpuModel){
        let model=parseInt(cpuModel[0]);
        let seri=parseInt(model.toString().substring(0,1));

        cpuScore = seri * 3;
    }
}

/* ================= GPU ANALİZ ================= */

if(gpu.includes("rtx")){
    let seri=gpu.match(/\d{3,4}/);
    if(seri){
        gpuScore=parseInt(seri[0])/100;
    }
}

else if(gpu.includes("gtx")){
    let seri=gpu.match(/\d{3,4}/);
    if(seri){
        gpuScore=parseInt(seri[0])/120;
    }
}

else if(gpu.includes("rx")){
    let seri=gpu.match(/\d{3,4}/);
    if(seri){
        gpuScore=parseInt(seri[0])/110;
    }
}

/* ================= RAM ================= */

if(ram>=32) ramScore=10;
else if(ram>=16) ramScore=7;
else if(ram>=8) ramScore=4;
else ramScore=2;

/* ================= GENEL HESAP ================= */

let toplam=(cpuScore + gpuScore + ramScore);
let fps=Math.floor(toplam*6);

let sonuc=document.getElementById("sonuc");

if(fps>=200){
    sonuc.innerHTML="🟢 "+fps+"+ FPS (Ultra)";
}
else if(fps>=144){
    sonuc.innerHTML="🟢 "+fps+" FPS (Yüksek)";
}
else if(fps>=60){
    sonuc.innerHTML="🟡 "+fps+" FPS (Orta)";
}
else{
    sonuc.innerHTML="🔴 "+fps+" FPS (Düşük)";
}

}
</script>
