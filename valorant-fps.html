<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Yiğido FPS</title>
</head>

<body style="background:black;color:white;text-align:center;font-family:Arial;padding:40px;">

<h1>FPS Test</h1>

<input id="cpu" placeholder="İşlemci"><br><br>
<input id="gpu" placeholder="Ekran Kartı"><br><br>
<input id="ram" placeholder="RAM"><br><br>

<button onclick="hesapla()">Hesapla</button>

<h2 id="sonuc"></h2>

<script>
function hesapla(){

var cpu=document.getElementById("cpu").value.toLowerCase();
var gpu=document.getElementById("gpu").value.toLowerCase();
var ram=parseInt(document.getElementById("ram").value);

var puan=0;

if(cpu.includes("14")) puan+=5;
else if(cpu.includes("13")) puan+=4;
else if(cpu.includes("10")) puan+=3;
else puan+=2;

if(gpu.includes("3060")) puan+=5;
else if(gpu.includes("1650")) puan+=3;
else puan+=2;

if(ram>=16) puan+=3;
else if(ram>=8) puan+=2;
else puan+=1;

var fps=puan*20;

document.getElementById("sonuc").innerHTML="Tahmini FPS: "+fps;
}
</script>

</body>
</html>
