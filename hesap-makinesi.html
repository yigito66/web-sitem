<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yiğido Hesap Makinesi</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.light{
    background:#f2f2f2;
    color:black;
}

.container{
    width:95%;
    max-width:400px;
    background:#2c2c3e;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.light .container{
    background:white;
}

.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.top button{
    width:48%;
    height:35px;
    font-size:12px;
}

#ekran{
    width:100%;
    height:55px;
    font-size:22px;
    margin-bottom:10px;
    text-align:right;
    padding-right:8px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
}

button{
    height:55px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.num{background:#444;color:white;}
.op{background:#4CAF50;color:white;}
.equal{background:#2196F3;color:white;}
.clear{background:#777;color:white;}
.percent{background:#9C27B0;color:white;}

#gecmis{
    margin-top:10px;
    max-height:120px;
    overflow:auto;
    font-size:13px;
    text-align:left;
}
</style>

<script>
let ekran;

window.onload=function(){
    ekran=document.getElementById("ekran");
    yukleGecmis();
}

function bip(){
    try{
        let ctx=new (window.AudioContext||window.webkitAudioContext)();
        let osc=ctx.createOscillator();
        osc.frequency.value=500;
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime+0.05);
    }catch{}
}

function ekle(x){
    bip();
    ekran.value+=x;
}

function temizle(){
    bip();
    ekran.value="";
}

function silSon(){
    bip();
    ekran.value = ekran.value.slice(0,-1);
}

function hesapla(){
    bip();
    try{
        let sonuc=eval(ekran.value);
        gecmiseEkle(ekran.value+" = "+sonuc);
        ekran.value=sonuc;
    }catch{
        alert("Hatalı işlem");
    }
}

function yuzde(){
    bip();
    try{
        ekran.value=eval(ekran.value)/100;
    }catch{
        alert("Hatalı işlem");
    }
}

function gecmiseEkle(yazi){
    let div=document.getElementById("gecmis");
    div.innerHTML+="<div>"+yazi+"</div>";
    localStorage.setItem("gecmis",div.innerHTML);
}

function gecmisSil(){
    document.getElementById("gecmis").innerHTML="";
    localStorage.removeItem("gecmis");
}

function yukleGecmis(){
    let kayit=localStorage.getItem("gecmis");
    if(kayit){
        document.getElementById("gecmis").innerHTML=kayit;
    }
}

function tema(){
    document.body.classList.toggle("light");
}

/* KLAVYE DESTEĞİ */
document.addEventListener("keydown",function(e){

    if(!isNaN(e.key)) ekle(e.key);

    if(["+","-","*","/","."].includes(e.key)) ekle(e.key);

    if(e.key==="Enter") hesapla();

    if(e.key==="Backspace")
        ekran.value=ekran.value.slice(0,-1);

    if(e.key==="Escape") temizle();

});
</script>
</head>

<body>

<div class="container">

<div class="top">
<button onclick="window.location.href='index.html'">🏠 Ana Sayfa</button>
<button onclick="tema()">🌙 Tema</button>
</div>

<input type="text" id="ekran" readonly>

<div class="grid">
<button class="num" onclick="ekle('7')">7</button>
<button class="num" onclick="ekle('8')">8</button>
<button class="num" onclick="ekle('9')">9</button>
<button class="op" onclick="ekle('/')">÷</button>

<button class="num" onclick="ekle('4')">4</button>
<button class="num" onclick="ekle('5')">5</button>
<button class="num" onclick="ekle('6')">6</button>
<button class="op" onclick="ekle('*')">×</button>

<button class="num" onclick="ekle('1')">1</button>
<button class="num" onclick="ekle('2')">2</button>
<button class="num" onclick="ekle('3')">3</button>
<button class="op" onclick="ekle('-')">−</button>

<button class="clear" onclick="temizle()">C</button>
<button class="num" onclick="ekle('0')">0</button>
<button class="equal" onclick="hesapla()">=</button>
<button class="op" onclick="ekle('+')">+</button>

<button class="percent" onclick="yuzde()">%</button>
<button class="num" onclick="ekle('.')">.</button>
<button class="clear" onclick="silSon()">←</button>
<button class="clear" onclick="gecmisSil()">🧹</button>
</div>

<h4>İşlem Geçmişi</h4>
<div id="gecmis"></div>

</div>

</body>
</html>
