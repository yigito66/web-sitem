<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Makinesi</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #1e1e2f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    transition: 0.3s;
}

.light-mode {
    background-color: #f2f2f2;
    color: black;
}

.container {
    width: 95%;
    max-width: 500px;
    background-color: #2c2c3e;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    text-align: center;
}

.light-mode .container {
    background-color: white;
}

input {
    width: 100%;
    height: 55px;
    font-size: 24px;
    margin-bottom: 15px;
    text-align: center;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

button {
    height: 65px;
    font-size: 24px;
    background-color: #4CAF50;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}

#gecmis {
    margin-top: 15px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 18px;
}
</style>

<script>
function hesapla(islem) {
    var sayi1 = parseFloat(document.getElementById("sayi1").value);
    var sayi2 = parseFloat(document.getElementById("sayi2").value);
    var sonuc;

    if (islem == "+") sonuc = sayi1 + sayi2;
    if (islem == "-") sonuc = sayi1 - sayi2;
    if (islem == "*") sonuc = sayi1 * sayi2;
    if (islem == "/") sonuc = sayi1 / sayi2;

    document.getElementById("sonuc").innerHTML = "Sonuç: " + sonuc;

    var gecmis = document.getElementById("gecmis");
    gecmis.innerHTML += "<div>" + sayi1 + " " + islem + " " + sayi2 + " = " + sonuc + "</div>";
}

function temaDegistir() {
    document.body.classList.toggle("light-mode");
}
</script>

</head>

<body>

<div class="container">

<h1>Hesap Makinesi</h1>

<button onclick="temaDegistir()">🌙 / ☀ Tema</button>

<input type="number" id="sayi1" placeholder="1. Sayı">
<input type="number" id="sayi2" placeholder="2. Sayı">

<div class="buttons">
    <button onclick="hesapla('+')">+</button>
    <button onclick="hesapla('-')">-</button>
    <button onclick="hesapla('*')">×</button>
    <button onclick="hesapla('/')">÷</button>
</div>

<h2 id="sonuc">Sonuç:</h2>

<h3>İşlem Geçmişi</h3>
<div id="gecmis"></div>

</div>

</body>
</html>
