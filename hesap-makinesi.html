<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Makinesi</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #3a3a6a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
    transition: 0.3s;
}

.light-mode {
    background: #f2f2f2;
    color: black;
}

.container {
    width: 95%;
    max-width: 500px;
    background-color: #2c2c3e;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

.light-mode .container {
    background-color: white;
}

h1 {
    margin-bottom: 10px;
}

.top-buttons {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.top-buttons button {
    width: 48%;
    height: 45px;
    font-size: 14px;
    border-radius: 8px;
}

input {
    width: 100%;
    height: 55px;
    font-size: 24px;
    margin-bottom: 15px;
    text-align: center;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
}

button {
    height: 65px;
    font-size: 24px;
    background-color: #4CAF50;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background-color: #45a049;
    transform: scale(1.05);
}

#gecmis {
    margin-top: 15px;
    max-height: 150px;
    overflow-y: auto;
    font-size: 16px;
    text-align: left;
}
</style>

<script>
function hesapla(islem) {
    var sayi1 = parseFloat(document.getElementById("sayi1").value);
    var sayi2 = parseFloat(document.getElementById("sayi2").value);

    if (isNaN(sayi1) || isNaN(sayi2)) {
        alert("Lütfen iki sayı girin!");
        return;
    }

    var sonuc;

    if (islem == "+") sonuc = sayi1 + sayi2;
    if (islem == "-") sonuc = sayi1 - sayi2;
    if (islem == "*") sonuc = sayi1 * sayi2;
    if (islem == "/") {
        if (sayi2 == 0) {
            alert("0'a bölünemez!");
            return;
        }
        sonuc = sayi1 / sayi2;
    }

    document.getElementById("sonuc").innerHTML = "Sonuç: " + sonuc;

    var gecmis = document.getElementById("gecmis");
    gecmis.innerHTML += "<div>" + sayi1 + " " + islem + " " + sayi2 + " = " + sonuc + "</div>";
}

function temaDegistir() {
    document.body.classList.toggle("light-mode");
}
</script>

</head>

<body>

<div class="container">

<h1>🧮 Hesap Makinesi</h1>

<div class="top-buttons">
    <button onclick="window.location.href='index.html'">🏠 Ana Sayfa</button>
    <button onclick="temaDegistir()">🌙 Tema</button>
</div>

<input type="number" id="sayi1" placeholder="1. Sayı">
<input type="number" id="sayi2" placeholder="2. Sayı">

<div class="buttons">
    <button onclick="hesapla('+')">+</button>
    <button onclick="hesapla('-')">-</button>
    <button onclick="hesapla('*')">×</button>
    <button onclick="hesapla('/')">÷</button>
</div>

<h2 id="sonuc">Sonuç:</h2>

<h3>İşlem Geçmişi</h3>
<div id="gecmis"></div>

</div>

</body>
</html>
