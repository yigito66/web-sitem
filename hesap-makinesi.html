<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Makinesi</title>

<style>
body {
    text-align: center;
    font-family: Arial;
    background-color: #1e1e2f;
    color: white;
}

h1 {
    margin-top: 30px;
}

input {
    width: 80%;
    height: 50px;
    font-size: 22px;
    margin: 10px;
    text-align: center;
}

button {
    width: 40%;
    height: 60px;
    font-size: 22px;
    margin: 5px;
    background-color: #4CAF50;
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}
</style>

<script>
function hesapla(islem) {
    var sayi1 = parseFloat(document.getElementById("sayi1").value);
    var sayi2 = parseFloat(document.getElementById("sayi2").value);
    var sonuc;

    if (islem == "+") {
        sonuc = sayi1 + sayi2;
    }
    if (islem == "-") {
        sonuc = sayi1 - sayi2;
    }
    if (islem == "*") {
        sonuc = sayi1 * sayi2;
    }
    if (islem == "/") {
        sonuc = sayi1 / sayi2;
    }

    document.getElementById("sonuc").innerHTML = "Sonuç: " + sonuc;
}
</script>

</head>

<body>

<h1>Hesap Makinesi</h1>

<input type="number" id="sayi1" placeholder="1. Sayı">
<br>
<input type="number" id="sayi2" placeholder="2. Sayı">
<br><br>

<button onclick="hesapla('+')">+</button>
<button onclick="hesapla('-')">-</button>
<br>
<button onclick="hesapla('*')">×</button>
<button onclick="hesapla('/')">÷</button>

<h2 id="sonuc">Sonuç:</h2>

</body>
</html>
