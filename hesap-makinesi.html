<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesap Makinesi</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#1e1e2f;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.light{
    background:#f2f2f2;
    color:black;
}

.container{
    width:95%;
    max-width:380px;
    background:#2c2c3e;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

.light .container{
    background:white;
}

.top{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
}

.top button{
    width:48%;
    height:35px;
    font-size:12px;
}

#ekran{
    width:100%;
    height:55px;
    font-size:24px;
    margin-bottom:10px;
    text-align:right;
    padding-right:8px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:6px;
}

button{
    height:55px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.num{background:#444;color:white;}
.op{background:#4CAF50;color:white;}
.equal{background:#2196F3;color:white;}
.clear{background:#777;color:white;}

#gecmis{
    margin-top:10px;
    max-height:100px;
    overflow:auto;
    font-size:13px;
    text-align:left;
}
</style>

<script>
let ekran;

window.onload=function(){
    ekran=document.getElementById("ekran");
}

function bip(){
    let ctx=new (window.AudioContext||window.webkitAudioContext)();
    let osc=ctx.createOscillator();
    osc.type="sine";
    osc.frequency.setValueAtTime(500,ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime+0.05);
}

function ekle(x){
    bip();
    ekran.value+=x;
}

function temizle(){
    bip();
    ekran.value="";
}

function hesapla(){
    bip();
    try{
        let sonuc=eval(ekran.value);
        document.getElementById("gecmis").innerHTML+="<div>"+ekran.value+" = "+sonuc+"</div>";
        ekran.value=sonuc;
    }catch{
        alert("Hatalı işlem");
    }
}

function gecmisSil(){
    document.getElementById("gecmis").innerHTML="";
}

function tema(){
    document.body.classList.toggle("light");
}
</script>
</head>

<body>

<div class="container">

<div class="top">
<button onclick="window.location.href='index.html'">🏠 Ana Sayfa</button>
<button onclick="tema()">🌙 Tema</button>
</div>

<input type="text" id="ekran" readonly>

<div class="grid">
<button class="num" onclick="ekle('7')">7</button>
<button class="num" onclick="ekle('8')">8</button>
<button class="num" onclick="ekle('9')">9</button>
<button class="op" onclick="ekle('/')">÷</button>

<button class="num" onclick="ekle('4')">4</button>
<button class="num" onclick="ekle('5')">5</button>
<button class="num" onclick="ekle('6')">6</button>
<button class="op" onclick="ekle('*')">×</button>

<button class="num" onclick="ekle('1')">1</button>
<button class="num" onclick="ekle('2')">2</button>
<button class="num" onclick="ekle('3')">3</button>
<button class="op" onclick="ekle('-')">−</button>

<button class="clear" onclick="temizle()">C</button>
<button class="num" onclick="ekle('0')">0</button>
<button class="equal" onclick="hesapla()">=</button>
<button class="op" onclick="ekle('+')">+</button>
</div>

<h4>İşlem Geçmişi</h4>
<div id="gecmis"></div>
<button class="clear" onclick="gecmisSil()">🧹 Geçmişi Temizle</button>

</div>

</body>
</html>
