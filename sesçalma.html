<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard (Engelsiz)</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:20px;
    width:300px;
    text-align:center;
}

button{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e3c72;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>🔊 Soundboard</h2>

    <button onclick="beep(200)">Ses 1</button>
    <button onclick="beep(400)">Ses 2</button>
    <button onclick="beep(600)">Ses 3</button>
    <button onclick="beep(800)">Ses 4</button>
    <button onclick="beep(1000)">Ses 5</button>
</div>

<script>

// 🔊 tamamen browser içi ses üretir
function beep(freq){
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    oscillator.type = "square";
    oscillator.frequency.value = freq;

    gain.gain.value = 0.1;

    oscillator.connect(gain);
    gain.connect(audioCtx.destination);

    oscillator.start();

    setTimeout(()=>{
        oscillator.stop();
    },200);
}

</script>

</body>
</html>
