<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard FIX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

button{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e3c72;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h2>🔊 Soundboard</h2>

    <button onclick="play('https://www.myinstants.com/instant/afia-oil-zil-sesi-85736/embed/')">Ses 1</button>
    <button onclick="play('https://www.myinstants.com/instant/dc-sovusss-84956/embed/')">Ses 2</button>
    <button onclick="play('https://www.myinstants.com/instant/korna-tir-28678/embed/')">Ses 3</button>
    <button onclick="play('https://www.myinstants.com/instant/zenciler-keremi-made-by-3mr3-8759/embed/')">Ses 4</button>
    <button onclick="play('https://www.myinstants.com/instant/kastamonu-taskopru-sarimsak-geldi-71831/embed/')">Ses 5</button>

    <div id="box"></div>
</div>

<script>
function play(url){
    document.getElementById("box").innerHTML =
        `<iframe src="${url}" width="1" height="1"></iframe>`;
}
</script>

</body>
</html>
