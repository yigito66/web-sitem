<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard FIX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

button{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e3c72;
    color:white;
    cursor:pointer;
}
button:hover{background:#16305c;}
</style>
</head>

<body>

<div class="container">
    <h2>🔊 Soundboard</h2>

    <p>👉 İlk olarak “Sesleri Aktifleştir”e bas</p>

    <button onclick="unlock()">🔓 Sesleri Aktifleştir</button>

    <button onclick="play('s1')">Ses 1</button>
    <button onclick="play('s2')">Ses 2</button>
    <button onclick="play('s3')">Ses 3</button>
    <button onclick="play('s4')">Ses 4</button>
    <button onclick="play('s5')">Ses 5</button>

</div>

<!-- 🎵 GERÇEK ÇALIŞAN SESLER -->
<audio id="s1" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
<audio id="s2" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="s3" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>
<audio id="s4" src="https://www.soundjay.com/buttons/sounds/button-21.mp3"></audio>
<audio id="s5" src="https://www.soundjay.com/buttons/sounds/button-22.mp3"></audio>

<script>

let unlocked = false;

function unlock(){
    // 🔓 tarayıcı kilidini açar
    let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
    audio.volume = 0;
    audio.play().then(()=>{
        unlocked = true;
        alert("🔊 Sesler açıldı!");
    }).catch(()=>{
        alert("Tarayıcı ses izni vermedi. Sayfaya tekrar tıkla.");
    });
}

function play(id){

    if(!unlocked){
        alert("Önce sesleri aktifleştir!");
        return;
    }

    let audio = document.getElementById(id);
    audio.currentTime = 0;
    audio.play();
}

</script>

</body>
</html>
