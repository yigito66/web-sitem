<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard FIX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

button{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e3c72;
    color:white;
    cursor:pointer;
}

button:hover{background:#16305c;}
</style>
</head>

<body>

<div class="container">
    <h2>🔊 Soundboard</h2>

    <p>👉 Önce “Başlat”a bas</p>

    <button onclick="unlock()">▶ Başlat</button>

    <button onclick="play('s1')">Ses 1</button>
    <button onclick="play('s2')">Ses 2</button>
    <button onclick="play('s3')">Ses 3</button>
    <button onclick="play('s4')">Ses 4</button>
    <button onclick="play('s5')">Ses 5</button>

    <audio id="s1" src="https://www.myinstants.com/media/sounds/afia-oil-zil-sesi-85736.mp3"></audio>
    <audio id="s2" src="https://www.myinstants.com/media/sounds/dc-sovusss-84956.mp3"></audio>
    <audio id="s3" src="https://www.myinstants.com/media/sounds/korna-tir-28678.mp3"></audio>
    <audio id="s4" src="https://www.myinstants.com/media/sounds/zenciler-keremi-made-by-3mr3-8759.mp3"></audio>
    <audio id="s5" src="https://www.myinstants.com/media/sounds/kastamonu-taskopru-sarimsak-geldi-71831.mp3"></audio>
</div>

<script>

let unlocked = false;

function unlock(){
    // 🔓 tarayıcı ses kilidini açar
    let temp = new Audio("https://www.myinstants.com/media/sounds/afia-oil-zil-sesi-85736.mp3");
    temp.volume = 0;
    temp.play().then(()=>{
        unlocked = true;
        alert("🔊 Ses açıldı!");
    }).catch(()=>{
        alert("Tarayıcı ses engelledi, tekrar dene.");
    });
}

function play(id){

    if(!unlocked){
        alert("Önce Başlat'a bas!");
        return;
    }

    let audio = document.getElementById(id);

    audio.currentTime = 0;
    audio.play().catch(()=>{
        alert("Ses oynatılamadı.");
    });
}

</script>

</body>
</html>
