<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundboard FIX</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    border-radius:20px;
    width:320px;
    text-align:center;
}

button{
    width:100%;
    margin:8px 0;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#1e3c72;
    color:white;
    cursor:pointer;
}
button:hover{background:#16305c;}
</style>
</head>

<body>

<div class="container">
    <h2>🔊 Soundboard</h2>

    <button onclick="play('https://www.myinstants.com/media/sounds/afia-oil-zil-sesi-85736.mp3')">Ses 1</button>
    <button onclick="play('https://www.myinstants.com/media/sounds/dc-sovusss-84956.mp3')">Ses 2</button>
    <button onclick="play('https://www.myinstants.com/media/sounds/korna-tir-28678.mp3')">Ses 3</button>
    <button onclick="play('https://www.myinstants.com/media/sounds/zenciler-keremi-made-by-3mr3-8759.mp3')">Ses 4</button>
    <button onclick="play('https://www.myinstants.com/media/sounds/kastamonu-taskopru-sarimsak-geldi-71831.mp3')">Ses 5</button>

    <audio id="audio"></audio>
</div>

<script>
function play(src){
    let audio = document.getElementById("audio");
    audio.src = src;
    audio.currentTime = 0;
    audio.play();
}
</script>

</body>
</html>
